# Profils disponibles (combinables) :
#   db    — PostgreSQL intégré
#   nginx — nginx + certbot intégrés
#
# Exemples :
#   COMPOSE_PROFILES=db,nginx  docker compose up -d  (tout intégré)
#   COMPOSE_PROFILES=db        docker compose up -d  (DB intégrée, proxy externe)
#   COMPOSE_PROFILES=nginx     docker compose up -d  (nginx intégré, DB externe)
#   COMPOSE_PROFILES=          docker compose up -d  (tout externe)
#
# install.sh gère cette variable automatiquement.

services:

  # ── Base de données (optionnelle) ──────────────────────────
  rpg-db:
    profiles: [db]
    image: postgres:15-alpine
    container_name: rpg-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rpg
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: "${RPG_DB_PASSWORD}"
    volumes:
      - rpg-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend RPG ────────────────────────────────────────────
  rpg:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rpg-backend:latest
    container_name: rpg
    restart: unless-stopped
    ports:
      # Exposé directement si pas de nginx intégré, sinon accessible via nginx uniquement
      - "${RPG_BIND:-127.0.0.1}:${RPG_PORT:-3001}:3001"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      PORT: "3001"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN}"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - ./frontend/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/rpg/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Nginx intégré (optionnel) ──────────────────────────────
  nginx:
    profiles: [nginx]
    image: nginx:alpine
    container_name: nginx-rpg
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - rpg

  certbot:
    profiles: [nginx]
    image: certbot/certbot:latest
    container_name: certbot-rpg
    restart: "no"
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: renew --quiet

volumes:
  rpg-db:
  nginx-logs:
